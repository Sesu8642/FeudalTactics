achievement-win-n-games-historic-title=Charlemagne
achievement-win-n-games-historic-description=Charlemagne (747-814) was King of the Franks and Lombards, Emperor of the Romans, winning many battles and uniting much of Western Europe during the early Middle Ages.
achievement-win-in-n-rounds-name=Win in {0} Rounds
achievement-win-in-n-rounds-description=Win a game in {0} rounds or less. The AI level must be Very Strong, the map size must be at least Medium.
achievement-win-in-n-rounds-historic-title=Jeanne d'Arc
achievement-win-in-n-rounds-historic-description=Jeanne d'Arc (1412-1431) was a French heroine and saint. She led the French army to important victories while she was still a teenager.
achievement-play-more-than-n-rounds-name=Win using more than {0} rounds
achievement-play-more-than-n-rounds-description=Win a game that lasts at least {0} rounds.
achievement-play-more-than-n-rounds-historic-title=Thirty Years' War
achievement-play-more-than-n-rounds-historic-description=The Thirty Years' War was a series of wars in Central Europe between 1618 and 1648.
achievement-play-more-than-n-rounds-historic2-title=Hundred Years' War
achievement-play-more-than-n-rounds-historic2-description=The Hundred Year's War was a series of conflicts waged from 1337 to 1453.
achievement-lose-against-weakest-ai-name=Lose against the weak AI
achievement-lose-against-weakest-ai-description=Lose a game against the weakest AI. Aborting does not count!
achievement-lose-against-weakest-ai-historic-title=Road to Canossa
achievement-lose-against-weakest-ai-historic-description=Holy Roman Emperor Henry IV went to Canossa to seek absolution from Pope Gregory VII. This was a humiliating event for the emperor.
achievement-win-very-hard-games-in-a-row-name=Win {0} Very Hard Games in a Row
achievement-win-very-hard-games-in-a-row-description=Win {0} games in a row on Very Hard AI difficulty. Any map size is allowed, but you must win consecutively without losing or aborting, and you must not re-generate the map (always use the first generated map). You must not change any setting, but always play the game you are presented with. Therefore, you must always play with the same color and the same map size you started with. Thus, you also must not play a game on lower difficulty in between. You must not even go back to the main menu once you have looked at the map.
achievement-win-very-hard-games-in-a-row-historic-title=William the Conqueror
achievement-win-very-hard-games-in-a-row-historic-description=William I. (1028-1087) was the first Norman King of England. He won many battles in a row, including the famous Battle of Hastings in 1066.
