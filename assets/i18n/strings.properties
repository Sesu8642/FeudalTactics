achievement-win-against-ai-level-historic-description=Frederick II. (1712-1786) was King of Prussia. While winning many battles, he is also known as a patron for education and the arts.
achievement-win-against-many-enemies-name=Win with {0} surviving enemies
achievement-win-against-many-enemies-description=Win a game where your enemies surrender -- and there are still {0} or more different enemies with surviving kingdoms.
achievement-win-against-many-enemies-historic-title=Louis XI
achievement-win-against-many-enemies-historic-description=Louis XI (1423-1483) was King of France and had the nickname 'The Universal Spider', as he carried out intrigues to play out his enemies against each other. He is known for his cunning and deviousness, but also for uniting France after the Hundred Years' War.
achievement-win-when-starting-last-name=Win When Starting Last
