# tutorial
tutorial-objective-game-goal=Feudal Tactics ist ein rundenbasiertes Strategiespiel. Du spielst auf einer Insel aus hexagonalen Feldern. Anhand der Farbe eines Feldes lässt sich der Besitzer bestimmen.\nZwei oder mehr zusammenhängende Felder gleicher Farbe bilden ein Königreich.\n\nZiel: Klicke/Tippe auf dein großes Königreich in der rechten unteren Ecke der Insel, um es auszuwählen.\n\nHinweis: Die Anzeige oben links zeigt die Farbe des Spielers, der am Zug ist. Da du dran bist, entspricht diese Farbe deiner Feldfarbe.\n\nInfo: Du kannst dein aktuelles Ziel jederzeit über die Schaltfläche anzeigen lassen, die so aussieht:
tutorial-objective-finances=Nach dem Auswählen deines Königreichs siehst du dessen Finanzen oben links.\n\nBeispiel: Ersparnisse: 14 (+12)\n14 ist die Menge an Münzen, die dieses Königreich besitzt. Sie können zum Kauf von Einheiten oder Burgen verwendet werden.\n12 ist das Einkommen pro Zug. Jedes Königreich erhält eine Münze pro Feld. Das Einkommen wird um die Gehälter der Einheiten reduziert.\n\nZiel: Klicke/Tippe auf diese Schaltfläche unten, um für 10 Münzen einen Bauern zu kaufen:
tutorial-objective-after-unit-purchase-part-1=Sieh, wie deine Ersparnisse und dein Einkommen gesunken sind.\nDu hast nun den Bauern in der Hand, angezeigt durch das Handsymbol rechts.
tutorial-objective-after-unit-purchase-part-2=\nDu kannst ihn in deinem eigenen Königreich platzieren oder ein feindliches Feld erobern. Ein Bauer kann nur ungeschützte Felder erobern, da er die schwächste Einheit ist.\n\nZiel: Erobere das ungeschützte Feld neben deinem Königreich.
tutorial-objective-end-turn-part-1=Nach dem Erobern können Einheiten wie dein Bauer bis zum nächsten Zug nicht mehr bewegt werden.\n\nDrücke diese Schaltfläche, um deinen Zug zu beenden:
tutorial-objective-end-turn-part-2=Deine Gegner führen dann ihre Züge aus.\n\nZiel: Beende deinen Zug.
tutorial-objective-select-kingdom=Du bist wieder am Zug. Wähle dein Königreich erneut aus.
tutorial-objective-protection-part-1=Die Felder des benachbarten feindlichen Königreichs sind durch die Hauptstadt geschützt. Einheiten, Hauptstädte und Burgen schützen das Feld, auf der sie stehen, sowie angrenzende Felder. Das Schutzlevel wird durch bis zu vier Schild‑Symbole angezeigt.
tutorial-objective-protection-part-2=Um ein geschütztes Feld zu erobern, brauchst du eine stärkere Einheit. In diesem Fall brauchst du mindestens einen Speerkämpfer, um ein von einer Hauptstadt geschütztes Feld zu erobern. Stärkere Einheiten erhältst du, indem du einen Bauern auf eine andere Einheit setzt.\n\nZiel: Kaufe einen zweiten Bauern und setze ihn auf den vorhandenen, um einen Speerkämpfer zu erzeugen.
tutorial-objective-unit-overview-part-1=Der so entstandene Speerkämpfer benötigt mehr Gehalt als ein Bauer. Hier ist eine Übersicht aller Einheiten.
tutorial-objective-unit-overview-part-2=Ziel: Greife deinen Gegner mit dem Speerkämpfer an.\n
tutorial-objective-trees=Da du die Größe des feindlichen Königreichs auf ein Feld reduziert hast, wurde die Hauptstadt zerstört und ein Baum ist gewachsen.\n\nEs gibt zwei Baumarten: Palmen und Eichen. Palmen wachsen an Küstenfeldern und verbreiten sich jede Runde. Eichen wachsen auf allen anderen Feldern und verbreiten sich nur, wenn zwei Eichen nebeneinander stehen. Auf einem Feld mit Baum erhältst du kein Einkommen. Bäume können durch das Platzieren einer Einheit auf ihnen gefällt werden. Danach kann die Einheit bis zum nächsten Zug nicht mehr bewegt werden, selbst wenn der Baum in deinem eigenen Königreich wächst.\n\nZiel: Fälle den Baum.\n\nHinweis: Du musst deinen Zug beenden, damit dein Speerkämpfer wieder bewegt werden kann.\n
tutorial-objective-castle-part-1=Jetzt kannst du eine Burg kaufen. Da Burgen kein Gehalt benötigen, eignen sie sich ideal für langfristige Verteidigung. Nur Ritter und Barone können Burgen zerstören.\n\nBenutze diese Schaltfläche, um eine Burg für 15 Münzen zu kaufen:
tutorial-objective-castle-part-2=Ziel: Kaufe und platziere eine Burg.\n\nHinweis: Du musst eventuell ein- oder mehfach den Zug beenden, um genug Münzen zu sammeln.\n\nTipp: Platziere die Burg nahe deiner Feinde, da sie nur die angrenzenden Felder schützt.\n
tutorial-objective-hint-collection=Jetzt kennst du die Grundlagen.\n\nPass auf, dass deine Hauptstadt nicht zerstört wird, sonst verlierst du die gesamten Ersparnisse des Königreichs.\nAchte zudem darauf, dass dein Gegner dein Königreich nicht in zwei Teile teilt. Nur der Teil mit der Hauptstadt behält dann das Geld, der andere startet bei 0.\n\nWenn du zu Beginn deines Zuges deine Einheiten nicht bezahlen kannst, sterben sie und hinterlassen Grabsteine, die nach einem Zug zu Bäumen werden.\n\nZiel: Erobere die ganze Insel, um das Spiel zu gewinnen.\n
tutorial-objective-undoing-part-1=Du kannst diese Schaltfläche nutzen, um Züge rückgängig zu machen, jedoch nur innerhalb des aktuellen Zuges:
tutorial-objective-undoing-part-2=Ziel: Erobere die ganze Insel, um das Spiel zu gewinnen.\n
tutorial-objective-shortcuts=Es gibt mehrere Tastenkürzel:\n- Zug rückgängig: Android‑ oder Maus‑Zurück‑Taste\n- Bauern kaufen: Rechtsklick\n- Bauern kaufen und im eigenen Königreich platzieren: Doppeltippen/-klicken\n- Burg kaufen: Mittlere Maustaste\n- Burg kaufen und platzieren: Lange Tippen/Klicken\n\nZiel: Erobere die ganze Insel, um das Spiel zu gewinnen.\n
