achievement-win-when-starting-last-historic-description=Tokugawa Ieyasu (1543‑1616) wurde in einer Samurai‑Familie geboren, nicht adlig. Obwohl er zunächst keine Machtposition hatte, wurde er 1603 im Alter von 60 Jahren zum Shogun von Japan.
