achievement-win-in-n-rounds-historic-title=Jeanne d'Arc
achievement-win-in-n-rounds-historic-description=Jeanne d'Arc (1412‑1431) war eine französische Heldin und Heilige, die bereits als Teenager die französische Armee zu wichtigen Siegen führte.
